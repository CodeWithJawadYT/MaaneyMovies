
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maaneymovies — Watch Full Movies Free</title>
<style>
  :root{
    --bg:#050505; --bg2:#120408; --red:#E50914; --red2:#FF1E27;
    --txt:#ffffff; --muted:#A3A3A3; --soft:#D4D4D4; --gold:#EAB308;
    --card:#120408; --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;overflow-x:hidden}
  img{display:block}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--red);color:#fff}
  @media(min-width:768px){.container{padding:0 48px}}

  /* ---------- Navbar ---------- */
  header{position:fixed;top:0;left:0;right:0;z-index:50;transition:background .3s;
    background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent)}
  header.scrolled{background:rgba(0,0,0,.85);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.06)}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 16px}
  @media(min-width:768px){.nav{padding:16px 48px}}
  .logo{font-weight:800;letter-spacing:.12em;font-size:26px;text-transform:uppercase;white-space:nowrap}
  .logo .a{color:var(--red);text-shadow:0 0 10px rgba(229,9,20,.55)}
  .logo .b{color:#fff}
  nav.links{display:none;gap:22px}
  @media(min-width:880px){nav.links{display:flex}}
  nav.links a{font-size:14px;color:var(--muted);transition:color .2s;cursor:pointer}
  nav.links a:hover,nav.links a.active{color:#fff}
  .nav-right{display:flex;align-items:center;gap:12px}
  .search{position:relative;display:flex;align-items:center}
  .search input{width:150px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
    color:#fff;border-radius:999px;padding:9px 14px 9px 34px;font-size:14px;outline:none;transition:.2s}
  @media(min-width:1024px){.search input{width:230px}}
  .search input:focus{box-shadow:0 0 0 2px var(--red);background:rgba(255,255,255,.15)}
  .search svg{position:absolute;left:11px;width:16px;height:16px;color:rgba(255,255,255,.5)}
  .menu-btn{display:flex;background:none;border:none;color:#fff;cursor:pointer}
  @media(min-width:880px){.menu-btn{display:none}}
  .mobile-links{display:none;flex-direction:column;gap:14px;padding:16px;background:rgba(0,0,0,.96);border-top:1px solid var(--line)}
  .mobile-links.open{display:flex}
  .mobile-links a{color:var(--soft);font-size:16px;cursor:pointer}

  /* ---------- Hero ---------- */
  .hero{position:relative;height:84vh;min-height:560px;display:flex;flex-direction:column;justify-content:flex-end}
  .hero .bg{position:absolute;inset:0}
  .hero .bg img{width:100%;height:100%;object-fit:cover;object-position:top}
  .hero .shade1{position:absolute;inset:0;background:linear-gradient(to right,var(--bg),rgba(5,5,5,.7),transparent);z-index:1}
  .hero .shade2{position:absolute;inset:0;background:linear-gradient(to top,var(--bg),transparent 60%);z-index:1}
  .hero-content{position:relative;z-index:2;max-width:640px;padding:0 16px 96px}
  @media(min-width:768px){.hero-content{padding:0 48px 112px}}
  .tag{font-family:monospace;font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--red)}
  .hero h1{font-size:clamp(34px,6vw,64px);font-weight:800;line-height:1.02;margin-top:10px;text-shadow:0 4px 24px rgba(0,0,0,.7)}
  .hero .meta{display:flex;gap:16px;margin-top:14px;font-family:monospace;font-size:14px;color:var(--soft);flex-wrap:wrap}
  .hero .meta .star{color:var(--gold);display:flex;align-items:center;gap:5px}
  .hero p.desc{margin-top:14px;color:var(--soft);max-width:560px;line-height:1.6;font-size:15px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-actions{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
  .hero-dots{position:absolute;bottom:30px;right:24px;z-index:3;display:flex;gap:8px}
  @media(min-width:768px){.hero-dots{right:48px}}
  .hero-dots button{height:6px;border-radius:999px;border:none;background:rgba(255,255,255,.4);width:12px;cursor:pointer;transition:.3s}
  .hero-dots button.on{width:32px;background:var(--red)}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;border-radius:4px;padding:12px 26px;
    font-size:15px;cursor:pointer;border:none;transition:transform .25s,background .25s;white-space:nowrap}
  .btn:hover{transform:scale(1.05)}
  .btn-red{background:var(--red);color:#fff;box-shadow:0 0 18px rgba(229,9,20,.45)}
  .btn-red:hover{background:var(--red2)}
  .btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px)}
  .btn-ghost:hover{background:rgba(255,255,255,.25)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;height:48px;width:48px;border-radius:999px;
    border:1px solid rgba(255,255,255,.4);background:rgba(0,0,0,.3);color:#fff;cursor:pointer;transition:.2s;font-size:20px}
  .icon-btn:hover{border-color:#fff}
  .icon-btn.saved{background:var(--red);border-color:var(--red)}

  /* ---------- Rows / cards ---------- */
  main{padding-bottom:40px}
  .rows{position:relative;z-index:5;margin-top:-60px}
  .row{padding:12px 0}
  .row h2{font-size:22px;font-weight:600;padding:0 16px 8px}
  @media(min-width:768px){.row h2{padding:0 48px 8px}}
  .row-scroll{display:flex;gap:14px;overflow-x:auto;padding:24px 16px;scroll-snap-type:x mandatory;scrollbar-width:none}
  @media(min-width:768px){.row-scroll{padding:24px 48px}}
  .row-scroll::-webkit-scrollbar{display:none}
  .card{position:relative;flex:0 0 auto;width:150px;aspect-ratio:2/3;border-radius:6px;overflow:hidden;
    background:var(--card);cursor:pointer;scroll-snap-align:start;transition:transform .45s ease,box-shadow .45s}
  @media(min-width:768px){.card{width:200px}}
  .card:hover{transform:scale(1.1);z-index:20;box-shadow:0 20px 50px rgba(0,0,0,.85)}
  .card .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    padding:12px;font-size:16px;font-weight:700}
  .card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .card .badges{position:absolute;top:8px;left:8px;z-index:3;display:flex;gap:6px}
  .badge{font-family:monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;
    background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);color:#fff}
  .card .overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;
    padding:12px;background:linear-gradient(to top,var(--bg),rgba(5,5,5,.2),transparent);opacity:0;transition:opacity .3s}
  .card:hover .overlay{opacity:1}
  .card .overlay h3{font-size:14px;line-height:1.2}
  .card .overlay .crow{display:flex;align-items:center;gap:10px;margin-top:4px;font-family:monospace;font-size:11px}
  .card .overlay .crow .star{color:var(--gold);display:flex;align-items:center;gap:3px}
  .card .overlay .crow .yr{color:var(--muted)}
  .card .overlay .acts{display:flex;gap:8px;margin-top:10px}
  .mini{height:32px;width:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:16px}
  .mini.play{background:#fff;color:#000}
  .mini.add{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.4);color:#fff}
  .mini.add.saved{background:var(--red);border-color:var(--red)}

  /* ---------- Grid views ---------- */
  .view{padding-top:96px;min-height:100vh}
  .view h1{font-size:clamp(26px,4vw,40px);font-weight:800;padding:0 16px}
  @media(min-width:768px){.view h1{padding:0 48px}}
  .filters{display:flex;flex-wrap:wrap;gap:16px;align-items:center;padding:22px 16px 0}
  @media(min-width:768px){.filters{padding:22px 48px 0}}
  .seg{display:flex;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:4px}
  .seg button{padding:7px 16px;border-radius:999px;border:none;background:none;color:var(--muted);font-size:14px;cursor:pointer;transition:.2s}
  .seg button.on{background:var(--red);color:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:18px 16px 0}
  @media(min-width:768px){.chips{padding:18px 48px 0}}
  .chip{padding:7px 16px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);
    color:var(--muted);font-size:14px;cursor:pointer;transition:.2s}
  .chip:hover{color:#fff;border-color:rgba(255,255,255,.3)}
  .chip.on{background:#fff;color:#000;border-color:#fff}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;padding:28px 16px}
  @media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));padding:28px 48px}}
  .grid .card{width:100%}
  .empty{text-align:center;color:var(--muted);padding:80px 16px}

  /* ---------- Details modal ---------- */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
    overflow-y:auto;display:none}
  .modal.open{display:block}
  .modal-inner{max-width:1100px;margin:0 auto;min-height:100%;background:var(--bg);position:relative}
  .modal-hero{position:relative;height:48vh;min-height:300px}
  .modal-hero img{width:100%;height:100%;object-fit:cover;object-position:top}
  .modal-hero .fallback{position:absolute;inset:0}
  .modal-hero .shade{position:absolute;inset:0;background:linear-gradient(to top,var(--bg),rgba(5,5,5,.4),rgba(5,5,5,.3))}
  .close-btn{position:absolute;top:18px;right:18px;z-index:5;height:42px;width:42px;border-radius:999px;
    background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .close-btn:hover{background:var(--red)}
  .modal-body{position:relative;z-index:2;margin-top:-90px;padding:0 16px 60px}
  @media(min-width:768px){.modal-body{padding:0 40px 60px}}
  .md-head{display:flex;flex-wrap:wrap;gap:24px}
  .md-poster{width:150px;flex:0 0 auto;aspect-ratio:2/3;border-radius:8px;overflow:hidden;border:1px solid var(--line);
    box-shadow:0 20px 50px rgba(0,0,0,.7);position:relative}
  @media(min-width:768px){.md-poster{width:220px}}
  .md-poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .md-info{flex:1;min-width:260px;padding-top:6px}
  .pill{display:inline-block;padding:5px 12px;border-radius:999px;font-size:12px;font-family:monospace;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff}
  .md-info h1{font-size:clamp(26px,4vw,44px);font-weight:800;margin-top:12px}
  .md-meta{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;font-family:monospace;font-size:14px;color:var(--soft)}
  .md-meta .star{color:var(--gold);display:flex;align-items:center;gap:5px}
  .md-genres{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .gtag{padding:5px 12px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--soft)}
  .md-audio{margin-top:18px}
  .md-audio .lbl{font-family:monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .audio-pill{padding:7px 16px;border-radius:999px;font-size:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:var(--soft);margin-right:8px}
  .md-desc{color:var(--soft);line-height:1.65;margin-top:18px;max-width:760px}
  .md-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
  .player-wrap{margin-top:44px}
  .player-wrap h2{font-size:22px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .player-box{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#000}
  .player-box video{width:100%;height:100%;background:#000}
  .player-cta{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer;border:none;width:100%;background:transparent}
  .player-cta img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.4}
  .player-cta .circle{position:relative;z-index:2;height:80px;width:80px;border-radius:999px;background:var(--red);
    display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(229,9,20,.6);transition:transform .3s}
  .player-cta:hover .circle{transform:scale(1.1)}
  .player-cta span{position:relative;z-index:2;font-family:monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#fff}
  .player-note{color:var(--muted);font-family:monospace;font-size:12px;margin-top:12px}
  .similar{margin-top:40px}

  footer{border-top:1px solid var(--line);padding:40px 16px;text-align:center;color:var(--muted);font-size:13px;margin-top:40px}
  @media(min-width:768px){footer{padding:40px 48px}}
  footer .logo{font-size:20px;display:inline-block;margin-bottom:10px}
  svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ============================================================
     MOBILE RESPONSIVE POLISH (overrides above — desktop unchanged)
     ============================================================ */
  @media(max-width:768px){
    /* --- navbar: shrink logo, let search flex, keep hamburger --- */
    .nav{padding:12px 16px;gap:10px}
    .logo{font-size:20px;letter-spacing:.06em}
    .nav-right{flex:1;gap:8px;justify-content:flex-end}
    .search{flex:1;min-width:0;max-width:300px}
    .search input{width:100%;padding:10px 12px 10px 34px;font-size:14px}
    .menu-btn{flex:0 0 auto}

    /* --- hero: tighter spacing, fits viewport better --- */
    .hero{height:78vh;min-height:460px}
    .hero-content{padding:0 16px 56px;max-width:100%}
    .hero h1{font-size:clamp(30px,9vw,44px)}
    .hero .meta{gap:12px;font-size:13px;margin-top:12px}
    .hero p.desc{font-size:14px;margin-top:12px;-webkit-line-clamp:3}
    .hero-actions{gap:10px;margin-top:20px}
    .hero-dots{bottom:18px;right:16px}

    /* --- buttons: comfortable touch targets --- */
    .btn{padding:12px 18px;font-size:14px}
    .icon-btn{height:46px;width:46px}

    /* --- rows / cards --- */
    .rows{margin-top:-36px}
    .row{padding:8px 0}
    .row h2{font-size:18px;padding:0 16px 6px}
    .row-scroll{gap:10px;padding:14px 16px}
    .card{width:138px}
    /* touch devices have no hover — reveal title + quick actions */
    .card .overlay{opacity:1;background:linear-gradient(to top,rgba(5,5,5,.96),rgba(5,5,5,.25) 55%,transparent)}
    .card .overlay h3{font-size:13px}
    .card:hover{transform:none}

    /* --- grid views: clean 2-up --- */
    .view{padding-top:80px}
    .view h1{font-size:clamp(24px,6vw,32px)}
    .grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:20px 16px}
    .filters{padding:18px 16px 0}
    .chips{padding:14px 16px 0;gap:8px}
    .chip,.seg button{font-size:13px}

    /* --- details modal: stacked, readable --- */
    .modal-hero{height:32vh;min-height:190px}
    .modal-body{margin-top:-56px;padding:0 16px 48px}
    .md-head{gap:16px}
    .md-poster{width:104px;border-radius:8px}
    .md-info{min-width:0;flex:1 1 100%;padding-top:0}
    .md-info h1{font-size:26px;margin-top:10px}
    .md-meta{gap:12px;font-size:13px;margin-top:10px}
    .md-genres{margin-top:10px;gap:6px}
    .md-desc{font-size:14px;margin-top:14px}
    .md-actions{gap:10px;margin-top:18px}
    .md-actions .btn{flex:1 1 auto;justify-content:center}
    .close-btn{top:14px;right:14px;height:40px;width:40px}
    .player-wrap{margin-top:28px}
    .player-wrap h2{font-size:18px}

    footer{padding:32px 16px;margin-top:28px}
  }

  /* very small phones */
  @media(max-width:400px){
    .logo{font-size:17px;letter-spacing:.04em}
    .search input::placeholder{font-size:13px}
    .card{width:124px}
    .grid{gap:10px}
    .btn{padding:11px 14px;font-size:13px}
  }
</style>
</head>
<body>
<header id="header">
  <div class="nav">
    <div style="display:flex;align-items:center;gap:32px">
      <div class="logo" onclick="go('home')" style="cursor:pointer"><span class="a">Maaney</span><span class="b">movies</span></div>
      <nav class="links" id="navLinks">
        <a data-view="home" onclick="go('home')">Home</a>
        <a data-view="browse" onclick="go('browse')">Categories</a>
        <a data-view="trending" onclick="go('trending')">Trending</a>
        <a data-view="watchlist" onclick="go('watchlist')">Watchlist</a>
      </nav>
    </div>
    <div class="nav-right">
      <form class="search" onsubmit="return doSearch(event)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" placeholder="Search movies…" />
      </form>
      <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
  <div class="mobile-links" id="mobileLinks">
    <a onclick="go('home')">Home</a>
    <a onclick="go('browse')">Categories</a>
    <a onclick="go('trending')">Trending</a>
    <a onclick="go('watchlist')">Watchlist</a>
  </div>
</header>

<main id="app"></main>

<!-- Movie details modal -->
<div class="modal" id="modal">
  <div class="modal-inner" id="modalInner"></div>
</div>

<footer>
  <div class="logo"><span class="a">Maaney</span><span class="b">movies</span></div>
  <p>Streaming public-domain feature films, free and legal, via the Internet Archive.</p>
  <p style="margin-top:6px;opacity:.6">© 2026 Maaneymovies — for personal &amp; educational use.</p>
</footer>

<script>
/* ============================================================
   MAANEYMOVIES — single-file build. 107 public-domain FULL films.
   Every movie streams a complete .mp4 (not a trailer) from archive.org.
   Watchlist is saved in your browser (localStorage). No server needed.
   ============================================================ */
const MOVIES = [
  {"id": 1001, "title": "Metropolis", "language": "en", "genres": ["Sci-Fi", "Drama"], "rating": 8.3, "year": 1927, "runtime": 153, "popularity": 100, "audio": ["Silent"], "poster": "https://archive.org/services/img/Metropolis1927EnglishVersion", "video": "https://archive.org/download/Metropolis1927EnglishVersion/Metropolis_1927_English_Version.mp4", "overview": "In a futuristic city sharply divided between the working class and the city planners, the son of the city's mastermind falls in love with a working-class prophet who predicts the coming of a savior."},

  {"id": 1003, "title": "The General", "language": "en", "genres": ["Comedy", "Action", "Adventure"], "rating": 8.1, "year": 1926, "runtime": 67, "popularity": 95, "audio": ["Silent"], "poster": "https://archive.org/services/img/TheGeneral1926", "video": "https://archive.org/download/TheGeneral1926/The_General_1926_720p.mp4", "overview": "When Union spies steal his beloved locomotive — with his girl aboard — a Confederate railroad engineer single-handedly chases them through enemy lines in Buster Keaton's masterpiece."},

const ROWS = [
  {name:"Trending Now", fn:list=>[...list].sort((a,b)=>b.popularity-a.popularity)},
  {name:"Indian Classics", fn:list=>list.filter(x=>x.language==="hi")},
  {name:"Hollywood Classics", fn:list=>list.filter(x=>x.language==="en")},
  {name:"Horror", fn:list=>list.filter(x=>x.genres.includes("Horror"))},
  {name:"Comedy", fn:list=>list.filter(x=>x.genres.includes("Comedy"))},
  {name:"Sci-Fi", fn:list=>list.filter(x=>x.genres.includes("Sci-Fi"))},
  {name:"Thriller & Noir", fn:list=>list.filter(x=>x.genres.includes("Thriller"))},
  {name:"Drama", fn:list=>list.filter(x=>x.genres.includes("Drama"))},
];

/* ---------- helpers ---------- */
const $ = s=>document.querySelector(s);
function gradientFor(t=""){let h=0;for(const c of t)h=(h*31+c.charCodeAt(0))%360;
  return `linear-gradient(145deg,hsl(${h} 55% 18%),hsl(${(h+40)%360} 60% 8%))`;}
function esc(s=""){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtRuntime(r){return r?`${Math.floor(r/60)}h ${r%60}m`:"";}
const byId = id=>MOVIES.find(x=>x.id===Number(id));

/* ---------- watchlist (localStorage) ---------- */
function getWL(){try{return JSON.parse(localStorage.getItem("mm_watchlist")||"[]")}catch(e){return[]}}
function setWL(a){localStorage.setItem("mm_watchlist",JSON.stringify(a))}
function isSaved(id){return getWL().includes(Number(id))}
function toggleWL(id){id=Number(id);let a=getWL();a.includes(id)?a=a.filter(x=>x!==id):a.push(id);setWL(a);
  render(); if($("#modal").classList.contains("open")) openDetails(currentId,true);}

/* ---------- card ---------- */
function cardHTML(x){
  const saved=isSaved(x.id);
  return `<div class="card" onclick="openDetails(${x.id})">
    <div class="fallback" style="background:${gradientFor(x.title)}">${esc(x.title)}</div>
    <img src="${x.poster}" alt="${esc(x.title)}" loading="lazy" onerror="this.style.display='none'"/>
    <div class="badges">
      <span class="badge">${x.language==="hi"?"HI":"EN"}</span>
      <span class="badge" style="background:var(--red);border-color:var(--red)">FULL</span>
    </div>
    <div class="overlay">
      <h3>${esc(x.title)}</h3>
      <div class="crow"><span class="star">★ ${x.rating.toFixed(1)}</span><span class="yr">${x.year}</span></div>
      <div class="acts">
        <button class="mini play" title="Play movie" onclick="event.stopPropagation();openDetails(${x.id},false,true)">
          <svg viewBox="0 0 24 24" width="15" height="15" style="fill:currentColor;stroke:none"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="mini add ${saved?'saved':''}" title="Watchlist" onclick="event.stopPropagation();toggleWL(${x.id})">${saved?'✓':'+'}</button>
      </div>
    </div>
  </div>`;
}
function rowHTML(name,items){
  if(!items.length)return"";
  return `<section class="row"><h2>${name}</h2><div class="row-scroll">${items.map(cardHTML).join("")}</div></section>`;
}

/* ---------- views ---------- */
let state={view:"home",search:"",lang:"all",genre:null};
let heroIdx=0, heroTimer=null, currentId=null;

function render(){
  setActiveNav();
  if(state.view==="home")renderHome();
  else if(state.view==="browse")renderBrowse();
  else if(state.view==="trending")renderTrending();
  else if(state.view==="watchlist")renderWatchlist();
}
function setActiveNav(){document.querySelectorAll("nav.links a").forEach(a=>
  a.classList.toggle("active",a.dataset.view===state.view));}

function renderHome(){
  const hero=[...MOVIES].sort((a,b)=>b.popularity-a.popularity).slice(0,6);
  const h=hero[heroIdx%hero.length];
  const saved=isSaved(h.id);
  const rows=ROWS.map(r=>rowHTML(r.name,r.fn(MOVIES))).join("");
  $("#app").innerHTML=`
    <section class="hero">
      <div class="bg"><div style="position:absolute;inset:0;background:${gradientFor(h.title)}"></div>
        <img src="${h.poster}" alt="" onerror="this.style.display='none'"/></div>
      <div class="shade1"></div><div class="shade2"></div>
      <div class="hero-content">
        <div class="tag">Featured Film</div>
        <h1>${esc(h.title)}</h1>
        <div class="meta"><span class="star">★ ${h.rating.toFixed(1)}</span><span>${h.year}</span><span>${h.language==="hi"?"Hindi":"English"}</span><span>${fmtRuntime(h.runtime)}</span></div>
        <p class="desc">${esc(h.overview)}</p>
        <div class="hero-actions">
          <button class="btn btn-red" onclick="openDetails(${h.id},false,true)"><svg viewBox="0 0 24 24" width="18" height="18" style="fill:currentColor;stroke:none"><path d="M8 5v14l11-7z"/></svg> Play</button>
          <button class="btn btn-ghost" onclick="openDetails(${h.id})"><svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> More Info</button>
          <button class="icon-btn ${saved?'saved':''}" onclick="toggleWL(${h.id})" title="Watchlist">${saved?'✓':'+'}</button>
        </div>
      </div>
      <div class="hero-dots">${hero.map((_,i)=>`<button class="${i===heroIdx%hero.length?'on':''}" onclick="setHero(${i})"></button>`).join("")}</div>
    </section>
    <div class="rows">${rows}</div>`;
  startHero(hero.length);
}
function setHero(i){heroIdx=i;renderHome();}
function startHero(n){clearInterval(heroTimer);if(n>1)heroTimer=setInterval(()=>{heroIdx=(heroIdx+1)%n;if(state.view==="home")renderHome();},8000);}

function allGenres(){const s=new Set();MOVIES.forEach(x=>x.genres.forEach(g=>s.add(g)));return[...s].sort();}
function renderBrowse(){
  let list=MOVIES;
  if(state.search){const q=state.search.toLowerCase();list=list.filter(x=>x.title.toLowerCase().includes(q));}
  else{
    if(state.lang!=="all")list=list.filter(x=>x.language===state.lang);
    if(state.genre)list=list.filter(x=>x.genres.includes(state.genre));
  }
  const langSeg=["all","en","hi"].map(k=>`<button class="${state.lang===k?'on':''}" onclick="setLang('${k}')">${k==="all"?"All":k==="en"?"English":"Hindi"}</button>`).join("");
  const chips=`<button class="chip ${!state.genre?'on':''}" onclick="setGenre(null)">All Genres</button>`+
    allGenres().map(g=>`<button class="chip ${state.genre===g?'on':''}" onclick="setGenre('${g}')">${g}</button>`).join("");
  $("#app").innerHTML=`<div class="view">
    <h1>${state.search?`Results for "${esc(state.search)}"`:"Browse Movies"}</h1>
    ${state.search?`<div class="chips"><button class="chip" onclick="clearSearch()">← Clear search</button></div>`:`
      <div class="filters"><div class="seg">${langSeg}</div></div>
      <div class="chips">${chips}</div>`}
    ${list.length?`<div class="grid">${list.map(cardHTML).join("")}</div>`:`<p class="empty">No movies found. Try a different filter or search.</p>`}
  </div>`;
}
function setLang(k){state.lang=k;render();}
function setGenre(g){state.genre=state.genre===g?null:g;render();}
function clearSearch(){state.search="";if($("#searchInput"))$("#searchInput").value="";render();}

function renderTrending(){
  const list=[...MOVIES].sort((a,b)=>b.popularity-a.popularity);
  $("#app").innerHTML=`<div class="view"><h1>🔥 Trending Now</h1><div class="grid">${list.map(cardHTML).join("")}</div></div>`;
}
function renderWatchlist(){
  const ids=getWL();const list=MOVIES.filter(x=>ids.includes(x.id));
  $("#app").innerHTML=`<div class="view"><h1>My Watchlist</h1>${
    list.length?`<div class="grid">${list.map(cardHTML).join("")}</div>`:
    `<p class="empty">Your watchlist is empty. Tap the + on any movie to save it here.</p>`}</div>`;
}

/* ---------- details modal ---------- */
function openDetails(id,scroll,autoplay){
  currentId=Number(id);const x=byId(id);if(!x)return;
  const saved=isSaved(x.id);
  const similar=MOVIES.filter(s=>s.id!==x.id&&s.genres.some(g=>x.genres.includes(g))).slice(0,12);
  $("#modalInner").innerHTML=`
    <button class="close-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <div class="modal-hero">
      <div class="fallback" style="background:${gradientFor(x.title)}"></div>
      <img src="${x.poster}" alt="" onerror="this.style.display='none'"/>
      <div class="shade"></div>
    </div>
    <div class="modal-body">
      <div class="md-head">
        <div class="md-poster" style="background:${gradientFor(x.title)}">
          <img src="${x.poster}" alt="${esc(x.title)}" onerror="this.style.display='none'"/></div>
        <div class="md-info">
          <span class="pill">${x.language==="hi"?"Hindi":"English"}</span>
          <h1>${esc(x.title)}</h1>
          <div class="md-meta"><span class="star">★ ${x.rating.toFixed(1)} <span style="color:var(--muted)">/10</span></span><span>${x.year}</span><span>${fmtRuntime(x.runtime)}</span></div>
          <div class="md-genres">${x.genres.map(g=>`<span class="gtag">${g}</span>`).join("")}</div>
          <div class="md-audio"><div class="lbl">Audio</div>${x.audio.map(a=>`<span class="audio-pill">${a}</span>`).join("")}</div>
          <p class="md-desc">${esc(x.overview)}</p>
          <div class="md-actions">
            <button class="btn btn-red" onclick="playMovie()"><svg viewBox="0 0 24 24" width="18" height="18" style="fill:currentColor;stroke:none"><path d="M8 5v14l11-7z"/></svg> Play Movie</button>
            <button class="btn btn-ghost" onclick="toggleWL(${x.id})">${saved?'✓ In Watchlist':'+ Add to Watchlist'}</button>
          </div>
        </div>
      </div>
      <div class="player-wrap">
        <h2><svg viewBox="0 0 24 24" width="22" height="22" style="color:var(--red)"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></svg> Watch Full Movie</h2>
        <div class="player-box" id="playerBox">
          <button class="player-cta" onclick="playMovie()">
            <img src="${x.poster}" alt="" onerror="this.style.display='none'"/>
            <div class="circle"><svg viewBox="0 0 24 24" width="34" height="34" style="fill:#fff;stroke:none"><path d="M8 5v14l11-7z"/></svg></div>
            <span>Play Full Movie</span>
          </button>
        </div>
        <p class="player-note">Full feature film · public-domain print streamed via the Internet Archive.</p>
      </div>
      ${similar.length?`<div class="similar"><section class="row"><h2 style="padding-left:0">More Like This</h2><div class="row-scroll" style="padding-left:0">${similar.map(cardHTML).join("")}</div></section></div>`:""}
    </div>`;
  $("#modal").classList.add("open");
  document.body.style.overflow="hidden";
  $("#modalInner").scrollTop=0;
  if(autoplay)playMovie();
}
function playMovie(){
  const x=byId(currentId);if(!x)return;
  $("#playerBox").innerHTML=`<video src="${x.video}" poster="${x.poster}" controls autoplay playsinline></video>`;
  $("#playerBox").scrollIntoView({behavior:"smooth",block:"center"});
}
function closeModal(){$("#modal").classList.remove("open");document.body.style.overflow="";if($("#playerBox"))$("#playerBox").innerHTML="";}

/* ---------- nav / search ---------- */
function go(view){state.view=view;state.search="";if($("#searchInput"))$("#searchInput").value="";
  closeModal();$("#mobileLinks").classList.remove("open");window.scrollTo(0,0);render();}
function doSearch(e){e.preventDefault();const v=$("#searchInput").value.trim();if(!v)return false;
  state.search=v;state.view="browse";closeModal();window.scrollTo(0,0);render();return false;}
function toggleMenu(){$("#mobileLinks").classList.toggle("open");}

/* scroll style + ESC */
window.addEventListener("scroll",()=>{$("#header").classList.toggle("scrolled",window.scrollY>20);});
window.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

/* init */
render();
</script>
</body>
</html>
